name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Check
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (ad-hoc)
        run: |
          xcodebuild \
            -scheme Usageview \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | tail -5
          echo "✅ Build succeeded"
