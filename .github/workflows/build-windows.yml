name: Build Windows App

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore QuotaBarWindows/QuotaBarWindows.csproj

      - name: Publish single-file exe
        run: >
          dotnet publish QuotaBarWindows/QuotaBarWindows.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o QuotaBarWindows/publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuotaBar-Windows
          path: QuotaBarWindows/publish/QuotaBar.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: QuotaBar-Windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: QuotaBar.exe
          generate_release_notes: true
